<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Calculator</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <section class="hero">
      <div class="screen">
        <div id="equationDisplay">0</div>
        <div id="solutionDisplay" class="fff">0</div>
      </div>
      <div class="button-container">
        <hr />

        <li class="has-submenu">
          <input type="checkbox" id="blog-toggle" class="submenu-toggle" />
          <label for="blog-toggle" class="arrow-wrapper">
            <img
              src="./image_downarrow.png"
              width="50px"
              class="arrow-icon"
              alt=""
            />
          </label>
          <div class="button-holder">
            <button id="squareRoot" class="topp">&radic;</button>
            <button id="powerBtn" class="topp">x <sup>2</sup></button>
            <button id="factorial" class="topp">&#33;</button>
            <button id="inverse" class="topp"><sup>1</sup>/<sub>x</sub></button>
            <button id="parentA" class="topp">&#40;</button>
            <button id="parentB" class="topp">&#41;</button>
            <button id="pie" class="topp">&pi;</button>
            <button id="doubleZero" class="topp">00</button>
          </div>
        </li>

        <div class="row1">
          <button id="clear" class="fnkeys" title="CLEAR">C</button>
          <button id="undo" class="fnkeys">BACK</button>
          <button id="percentage" class="fnkeys" title="PERCENT">%</button>
          <button id="divide" class="fnkeys" title="DIVISION">&#247;</button>
        </div>
        <div class="row2">
          <button class="numberz" id="seven">7</button>
          <button class="numberz" id="eight">8</button>
          <button class="numberz" id="nine">9</button> 
          <button id="multiply" class="fnkeys" title="MULTIPLICATION">x</button>
        </div>
        <div class="row3">
          <button class="numberz" id="four">4</button>
          <button class="numberz" id="five">5</button>
          <button class="numberz" id="six">6</button>
          <button id="minus" class="fnkeys" title="SUBTRACTION">&mdash;</button>
        </div>
        <div class="row4">
          <button class="numberz" id="one">1</button>
          <button class="numberz" id="two">2</button>
          <button class="numberz" id="three">3</button>
          <button id="addIt" class="fnkeys" title="ADDITION">+</button>
        </div>
        <div class="row5">
          <button class="numberz" id="zero">0</button>
          <button class="numberz" id="dott">.</button>
          <button id="equationSign" class="equalz">=</button>
        </div>
        <hr />
      </div>
    </section>

    <script src="./index.js"></script>
  </body>
</html>
